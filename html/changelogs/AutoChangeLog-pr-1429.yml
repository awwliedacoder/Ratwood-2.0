author: "BlankSpaceHere"
delete-after: True
changes:
  - rscadd: "Eorans can now pray before opening a pomegranate to guarantee a Satin Aril."
  - rscadd: "New Eoran Ritual. Permanent Pacifism in exchange for an energizing and calming aura"
  - bugfix: "Eoran Trees can actually be planted on the most common types of grass"
  - bugfix: "You can no longer remove an Eoran Bud alone through click-dragging."
  - balance: "Changed Crimson arils to heal percent of total damage in addition to a flat amount."
  - balance: "Eoran Acolytes and Missionaries start with scissors for their tree."
  - balance: "Gave Eoran acolytes and templars +1 Cooking/Sewing with acolytes having an extra +1 farming"
  - balance: "Blessed food now grants haste to any Tennite eating it"
  - balance: "Increased the range for the Eoran Bond status effect"