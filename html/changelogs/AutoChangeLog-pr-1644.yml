author: "zeroisthebiggay"
delete-after: True
changes:
  - rscadd: "ancient armored boots and ancient armored sandals"
  - balance: "skeletal legionnaires, skeletal ballistaires, and broken bone sappers have been given ancient armored sandals"
  - balance: "decrepit sandals are now decrepit armored sandals, with ever so slight amounts of protection so you can't footstab skeletons to death quite as easily"
  - balance: "skeletal legionnaires are given an ancient cuirass instead of studded leather armor to differentiate their armor layout from skeletal balistaires"
  - balance: "death bulwarks now have halfplate and plated chausses, now they should actually function better as death bulwarks and less as far worse skeletal legionnaires"
  - balance: "death bulwarks have ancient boots instead of decrepit boots"
  - balance: "death bulwarks now are given an ancient shield instead of a wooden shield where applicable"
  - balance: "ancient bucklers no longer have reduced integrity compared to their regular steel counterparts"
  - balance: "ancient bodkin arrows no longer have reduced damage and armor penetration compared to their regular steel counterparts"
  - balance: "ancient crossbow bolts no longer have reduced damage and armor penetration compared to their regular steel counterparts"
  - balance: "broken bone sappers have smithing skills to toil for their masters and arm their undead legions"
  - bugfix: "a few very random items smelting down into ancient alloy ingots instead of ancient slags"
  - bugfix: "iron javelins smelting into iron ingots"
  - bugfix: "artificed halfplate now has its mode swapped by using tongs, allowing it to actually be repaired"
  - spellcheck: "renamed 'buckler shield' to just 'buckler'"
  - spellcheck: "renamed 'ancient alloy ingot' to 'gilbranze ingot'"
  - spellcheck: "normalized all spellings of 'gilbronze' to 'gilbranze'"
  - spellcheck: "instances of 'purified alloy' are now gilbranze in the code"
  - code_imp: "nuked paalloy and aalloy from the codebase, making everything that was paalloy before into ancient subtypes of steel, and aalloy into decrepit which are subtypes of ancient whenever applicable, not player facing at all but dramatically improves the appearance and organization of the code"